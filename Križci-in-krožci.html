<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Križci in krožci - Tic-Tac-Toe</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      color: #333;
    }

    #game-container {
      text-align: center;
      max-width: 400px;
      margin: auto;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      margin: 20px auto;
    }

    .cell {
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2em;
      background-color: #ecf0f1;
      cursor: pointer;
    }

    #result, #mode-selection, #controls {
      margin-top: 10px;
    }

    #mode-selection button, #controls button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div id="game-container">
  <h1>Križci in krožci</h1>

  <div id="mode-selection">
    <label>
      Ime igralca 1: 
      <input type="text" id="player1-name" placeholder="Igralec 1" value="Player 1">
    </label>
    <br>
    <label>
      Ime igralca 2 / AI: 
      <input type="text" id="player2-name" placeholder="Igralec 2 / AI" value="Player 2">
    </label>
    <br>
    <label>
      Stopnja AI težavnosti:
      <select id="ai-difficulty">
        <option value="easy">Enostavno</option>
        <option value="normal">Normalno</option>
        <option value="hard">Težko</option>
      </select>
    </label>
    <br>
    <button onclick="startGame('PvP')">Player vs Player</button>
    <button onclick="startGame('PvAI')">Player vs AI</button>
  </div>

  <div id="board" class="hidden"></div>
  <div id="result"></div>

  <!-- Kontrole za Ponovni začetek, Novo igro in Domov -->
  <div id="controls" class="hidden">
    <button onclick="resetGame()">Ponovni začetek</button>
    <button onclick="showStartScreen()">Novo igro</button>
    <a href="index.html"><button>Domov</button></a>
  </div>
</div>

<script>
  const boardElement = document.getElementById("board");
  const resultElement = document.getElementById("result");
  const player1NameInput = document.getElementById("player1-name");
  const player2NameInput = document.getElementById("player2-name");
  const aiDifficultySelect = document.getElementById("ai-difficulty");
  const modeSelection = document.getElementById("mode-selection");
  const controls = document.getElementById("controls");

  let board, currentPlayer, gameMode, player1, player2;

  function startGame(mode) {
    gameMode = mode;
    player1 = player1NameInput.value || "Player 1";
    player2 = mode === "PvP" ? (player2NameInput.value || "Player 2") : (player2NameInput.value || "AI");
    currentPlayer = "X";
    board = ["", "", "", "", "", "", "", "", ""];
    resultElement.innerHTML = "";
    modeSelection.classList.add("hidden");
    boardElement.classList.remove("hidden");
    controls.classList.remove("hidden");
    renderBoard();
  }

  function renderBoard() {
    boardElement.innerHTML = "";
    board.forEach((cell, index) => {
      const cellElement = document.createElement("div");
      cellElement.classList.add("cell");
      cellElement.textContent = cell;
      cellElement.addEventListener("click", () => makeMove(index));
      boardElement.appendChild(cellElement);
    });
  }

  function makeMove(index) {
    if (board[index] || resultElement.textContent) return;

    board[index] = currentPlayer;
    renderBoard();

    if (checkWin(currentPlayer)) {
      resultElement.innerHTML = `${currentPlayer === "X" ? player1 : player2} je zmagal!`;
      return;
    }

    if (board.every(cell => cell)) {
      resultElement.innerHTML = "Igra je izenačena!";
      return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";

    if (gameMode === "PvAI" && currentPlayer === "O") {
      makeAIMove();
    }
  }

  function makeAIMove() {
    const difficulty = aiDifficultySelect.value;
    let move;

    if (difficulty === "easy") {
      move = getRandomMove();
    } else if (difficulty === "normal") {
      move = Math.random() < 0.5 ? getRandomMove() : getBestMove();
    } else {
      move = getBestMove();
    }

    board[move] = "O";
    currentPlayer = "X";
    renderBoard();

    if (checkWin("O")) {
      resultElement.innerHTML = `${player2} (AI) je zmagal!`;
    }
  }

  function getRandomMove() {
    const emptyCells = board.map((cell, index) => cell === "" ? index : null).filter(index => index !== null);
    return emptyCells[Math.floor(Math.random() * emptyCells.length)];
  }

  function getBestMove() {
    let bestScore = -Infinity;
    let move;

    for (let i = 0; i < board.length; i++) {
      if (board[i] === "") {
        board[i] = "O";
        let score = minimax(board, 0, false);
        board[i] = "";
        if (score > bestScore) {
          bestScore = score;
          move = i;
        }
      }
    }
    return move;
  }

  function minimax(board, depth, isMaximizing) {
    if (checkWin("O")) return 1;
    if (checkWin("X")) return -1;
    if (board.every(cell => cell)) return 0;

    if (isMaximizing) {
      let bestScore = -Infinity;
      for (let i = 0; i < board.length; i++) {
        if (board[i] === "") {
          board[i] = "O";
          let score = minimax(board, depth + 1, false);
          board[i] = "";
          bestScore = Math.max(score, bestScore);
        }
      }
      return bestScore;
    } else {
      let bestScore = Infinity;
      for (let i = 0; i < board.length; i++) {
        if (board[i] === "") {
          board[i] = "X";
          let score = minimax(board, depth + 1, true);
          board[i] = "";
          bestScore = Math.min(score, bestScore);
        }
      }
      return bestScore;
    }
  }

  function checkWin(player) {
    const winPatterns = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];
    return winPatterns.some(pattern => pattern.every(index => board[index] === player));
  }

  function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    resultElement.innerHTML = "";
    renderBoard();
  }

  function showStartScreen() {
    boardElement.classList.add("hidden");
    controls.classList.add("hidden");
    modeSelection.classList.remove("hidden");
    resultElement.innerHTML = "";
  }
</script>

</body>
</html>
