<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nerešene skrivnosti: ZDA izdaja</title>
  <link rel="stylesheet" href="kviz-zanimive-teorijecss.css">

</head>
<body>

<div id="kviz-posoda">
  <h1>Nerešene skrivnosti: ZDA izdaja</h1>
  
  <!-- Gumbi za prilagoditev velikosti pisave -->
  <button class="font-control" onclick="spremeniVelikostPisave(1)">Povečaj pisavo</button>
  <button class="font-control" onclick="spremeniVelikostPisave(-1)">Zmanjšaj pisavo</button>

  <div id="napredek"></div> 
  <div id="vprasanje-posoda">
    <div id="vprasanje"></div>
    <div class="moznosti" id="moznosti"></div>
  </div>
  <div id="kontrole" class="skrito">
    <button onclick="ponovniZacetek()">Ponovni začetek</button>
    <a href="quizzes.html"><button>Kvizi</button></a>
    <a href="index.html"><button>Domov</button></a>
  </div>
</div>

<script>
  // Nastavitev začetne velikosti pisave
  let trenutnaVelikostPisave = 22;

  // Funkcija za prilagajanje velikosti pisave
  function spremeniVelikostPisave(sprememba) {
    trenutnaVelikostPisave += sprememba;
    document.getElementById("kviz-posoda").style.fontSize = trenutnaVelikostPisave + "px";
  }

   // Podatki o vprašanjih v kvizu
   const podatkiKviz = [
      { 
        vprasanje: "Kateri kraj v Nevadi je najbolj povezan z teorijami o UFO-jih in nezemljanih?", 
        moznosti: ["Area 51", "Roswell", "Sedona", "Las Vegas"], 
        odgovor: "Area 51" 
      },
      { 
        vprasanje: "Katera ameriška baza je znana po incidentu iz leta 1947, povezanem z domnevnim strmoglavljenjem UFO-ja?", 
        moznosti: ["Roswell", "Dulce Base", "Area 51", "Edwards Air Force Base"], 
        odgovor: "Roswell" 
      },
      { 
        vprasanje: "Katero ameriško mesto naj bi bilo pod vplivom skrivnih iluminatskih simbolov?", 
        moznosti: ["Washington D.C.", "New York City", "Los Angeles", "Chicago"], 
        odgovor: "Washington D.C." 
      },
      { 
        vprasanje: "Kateri naravni spomenik je po teorijah dom prehodov v druge dimenzije?", 
        moznosti: ["Mount Shasta", "Grand Canyon", "Yellowstone", "Mount Rainier"], 
        odgovor: "Mount Shasta" 
      },
      { 
        vprasanje: "Kateri kraj je povezan z nenavadnimi svetlobnimi pojavi, imenovanimi 'Marfa Lights'?", 
        moznosti: ["Texas", "Arizona", "Nevada", "Utah"], 
        odgovor: "Texas" 
      },
      { 
        vprasanje: "Katera ameriška organizacija naj bi po teorijah nadzorovala um ljudi z eksperimentom MKUltra?", 
        moznosti: ["CIA", "FBI", "NSA", "NASA"], 
        odgovor: "CIA" 
      },
      { 
        vprasanje: "Katera gora v ZDA je povezana z mističnimi legendami in domnevnimi pojavami Bigfoota?", 
        moznosti: ["Mount Shasta", "Mount Hood", "Mount Rainier", "Rocky Mountains"], 
        odgovor: "Mount Shasta" 
      },
      { 
        vprasanje: "Kateri otok je po teorijah mesto, kjer so se izvajali nezakoniti biološki poskusi na živalih?", 
        moznosti: ["Plum Island", "Alcatraz", "Catalina Island", "Mackinac Island"], 
        odgovor: "Plum Island" 
      },
      { 
        vprasanje: "Katero ameriško mesto je središče teorij o podzemnem kraljestvu Agartha?", 
        moznosti: ["Dulce", "Sedona", "Denver", "Las Vegas"], 
        odgovor: "Dulce" 
      },
      { 
        vprasanje: "Katero mesto ima letališče, za katerega mnogi verjamejo, da skriva podzemne baze iluminatov?", 
        moznosti: ["Denver", "Dallas", "Atlanta", "Los Angeles"], 
        odgovor: "Denver" 
      },
      { 
        vprasanje: "Katera ameriška regija je znana po skrivnostnih izginotjih letal in ladij?", 
        moznosti: ["Bermudski trikotnik", "Hudson River", "Lake Michigan", "Gulf of Mexico"], 
        odgovor: "Bermudski trikotnik" 
      },
      { 
        vprasanje: "Katera skrivnostna ameriška organizacija je povezana s teorijami o globalni dominaciji?", 
        moznosti: ["Skull and Bones", "Freemasons", "Bohemian Grove", "Illuminati"], 
        odgovor: "Illuminati" 
      },
      { 
        vprasanje: "Kateri kraj v Kaliforniji je povezan z legendami o skritih tunelih in zakladih templjarjev?", 
        moznosti: ["Oak Island", "Mount Shasta", "Napa Valley", "Los Angeles"], 
        odgovor: "Oak Island" 
      },
      { 
        vprasanje: "Katera teorija govori o skrivnem planetu, ki naj bi trčil z Zemljo?", 
        moznosti: ["Planet X (Nibiru)", "Venus Effect", "Dark Star", "Wormwood"], 
        odgovor: "Planet X (Nibiru)" 
      },
      { 
        vprasanje: "Katera vojaška baza je povezana z domnevnim razvojem časovnega potovanja?", 
        moznosti: ["Montauk", "Area 51", "Wright-Patterson", "Fort Knox"], 
        odgovor: "Montauk" 
      },
      { 
        vprasanje: "Kateri kraj v ZDA je povezan z rituali elitne skrivne družbe?", 
        moznosti: ["Bohemian Grove", "Skull Island", "Alcatraz", "Roswell"], 
        odgovor: "Bohemian Grove" 
      },
      { 
        vprasanje: "Katera ameriška reka je povezana z nenavadnimi svetlobnimi pojavi?", 
        moznosti: ["Hudson River", "Mississippi", "Colorado", "Rio Grande"], 
        odgovor: "Hudson River" 
      },
      { 
        vprasanje: "Katera teorija zarote govori o skrivnostnem uničenju nebotičnikov 11. septembra?", 
        moznosti: ["Controlled Demolition", "Missile Theory", "Alien Intervention", "Shadow Government"], 
        odgovor: "Controlled Demolition" 
      },
      { 
        vprasanje: "Kateri kraj v ZDA je povezan z nenavadnimi in nepojasnjenimi požari?", 
        moznosti: ["Centralia", "Chicago", "Los Angeles", "Napa Valley"], 
        odgovor: "Centralia" 
      },
      { 
        vprasanje: "Katera znamenita ameriška lokacija naj bi bila domovanje mističnih energij in UFO-jev?", 
        moznosti: ["Sedona", "Roswell", "Area 51", "Grand Canyon"], 
        odgovor: "Sedona" 
      }
    ];
    
  


  // Ostala logika kviza ostane enaka
  let indeksVprasanja = 0;
  let rezultat = 0;
  let uporabnikoviOdgovori = [];

  function posodobiNapredek() {
    document.getElementById("napredek").innerText = `Vprašanje ${indeksVprasanja + 1} od ${podatkiKviz.length}`;
  }

  function naloziVprasanje() {
    const trenutniVprasanje = podatkiKviz[indeksVprasanja];
    document.getElementById("vprasanje").innerText = trenutniVprasanje.vprasanje;
    const moznostiPosoda = document.getElementById("moznosti");
    moznostiPosoda.innerHTML = "";

    trenutniVprasanje.moznosti.forEach(moznost => {
      const gumb = document.createElement("button");
      gumb.innerText = moznost;
      gumb.onclick = () => preveriOdgovor(moznost);
      moznostiPosoda.appendChild(gumb);
    });
    posodobiNapredek(); 
  }

  function preveriOdgovor(odgovor) {
    uporabnikoviOdgovori.push(odgovor);
    if (odgovor === podatkiKviz[indeksVprasanja].odgovor) {
      rezultat++;
    }
    indeksVprasanja++;
    if (indeksVprasanja < podatkiKviz.length) {
      naloziVprasanje();
    } else {
      prikaziRezultat();
    }
  }

  function prikaziRezultat() {
    let rezultatHtml = `<h2>Kviz končan!</h2>`;
    rezultatHtml += `<p>Pravilnih odgovorov: ${rezultat} od ${podatkiKviz.length}</p>`;
    rezultatHtml += `<h3>Pravilni odgovori:</h3><ul>`;
    podatkiKviz.forEach((item, index) => {
      const razredOdgovora = (uporabnikoviOdgovori[index] === item.odgovor) ? 'pravilno' : 'napacno';
      rezultatHtml += `<li class="${razredOdgovora}">${index + 1}. ${item.vprasanje} - <strong>${item.odgovor}</strong></li>`;
    });
    rezultatHtml += `</ul>`;
    document.getElementById("vprasanje-posoda").innerHTML = rezultatHtml;
    document.getElementById("kontrole").style.display = "block";
  }

  function ponovniZacetek() {
    rezultat = 0;
    indeksVprasanja = 0;
    uporabnikoviOdgovori = [];
    document.getElementById("kontrole").style.display = "none";
    document.getElementById("vprasanje-posoda").innerHTML = `
      <div id="vprasanje"></div>
      <div class="moznosti" id="moznosti"></div>
    `;
    naloziVprasanje();
  }

  naloziVprasanje();
</script>

</body>
</html>
